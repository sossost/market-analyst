name: Weekly QA Analysis

on:
  schedule:
    # Run Saturday UTC 03:00 (KST 12:00) — after weekly agent completes
    - cron: "0 3 * * 6"
  workflow_dispatch: # Manual trigger

jobs:
  run-weekly-qa:
    name: Run Weekly QA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/agent/run-weekly-qa.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_DEBATE_WEBHOOK_URL: ${{ secrets.DISCORD_DEBATE_WEBHOOK_URL }}
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
      - name: Commit QA report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/qa-reports/
          git diff --staged --quiet || git commit -m "chore: add weekly QA report $(date +%Y-%m-%d)"
          git push
