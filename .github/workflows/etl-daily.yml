name: Daily ETL Pipeline

on:
  schedule:
    # Run at UTC 00:00 (KST 09:00) — weekdays only
    - cron: "0 0 * * 1-5"
  workflow_dispatch: # Manual trigger

jobs:
  # ===== Phase 1: Screener Data ETL =====

  load-daily-prices:
    name: Load Daily Prices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/load-daily-prices.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATA_API: ${{ secrets.DATA_API }}

  build-daily-ma:
    name: Build Daily MA
    needs: load-daily-prices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/build-daily-ma.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-rs:
    name: Build RS Scores
    needs: load-daily-prices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/build-rs.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  calculate-daily-ratios:
    name: Calculate Daily Ratios
    needs: load-daily-prices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/calculate-daily-ratios.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATA_API: ${{ secrets.DATA_API }}

  # ===== Phase 2: Signal ETL (depends on MA + RS) =====

  build-breakout-signals:
    name: Build Breakout Signals
    needs: [build-daily-ma, build-rs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/build-breakout-signals.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-noise-signals:
    name: Build Noise Signals
    needs: [build-daily-ma, build-rs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/build-noise-signals.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ===== Phase 3: Analyst ETL =====

  build-stock-phases:
    name: Build Stock Phases
    needs: [build-daily-ma, build-rs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/build-stock-phases.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-sector-rs:
    name: Build Sector RS
    needs: build-stock-phases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/build-sector-rs.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-industry-rs:
    name: Build Industry RS
    needs: build-stock-phases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/build-industry-rs.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ===== Phase 4: Validate & Agent =====

  validate:
    name: Validate Data
    needs: [build-sector-rs, build-industry-rs, build-breakout-signals, build-noise-signals]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/validate-data.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  run-agent:
    name: Run Daily Agent
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/agent/run-daily-agent.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
