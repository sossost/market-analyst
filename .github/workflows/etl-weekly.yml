name: Weekly ETL Pipeline

on:
  schedule:
    # Run at UTC 07:00 (KST 16:00) — Sundays
    - cron: "0 7 * * 0"
  workflow_dispatch: # Manual trigger

jobs:
  load-symbols:
    name: Load US Symbols
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/load-us-symbols.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATA_API: ${{ secrets.DATA_API }}

  cleanup-symbols:
    name: Cleanup Invalid Symbols
    needs: load-symbols
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/cleanup-invalid-symbols.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  load-ratios:
    name: Load Financial Ratios
    needs: cleanup-symbols
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/load-ratios.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATA_API: ${{ secrets.DATA_API }}

  load-quarterly-financials:
    name: Load Quarterly Financials
    needs: cleanup-symbols
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/load-quarterly-financials.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATA_API: ${{ secrets.DATA_API }}

  promote-learnings:
    name: Promote Learnings
    needs: [load-ratios, load-quarterly-financials]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/etl/jobs/promote-learnings.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
