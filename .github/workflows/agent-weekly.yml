name: Weekly Agent Analysis

on:
  schedule:
    # Run Saturday UTC 01:00 (KST 10:00) — after Friday market data is processed
    - cron: "0 1 * * 6"
  workflow_dispatch: # Manual trigger

jobs:
  run-weekly-agent:
    name: Run Weekly Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx src/agent/run-weekly-agent.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEEKLY_WEBHOOK_URL: ${{ secrets.DISCORD_WEEKLY_WEBHOOK_URL }}
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
      - name: Generate CEO Weekly Report
        run: npx tsx src/etl/jobs/generate-ceo-report.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_SYSTEM_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_SYSTEM_REPORT_WEBHOOK_URL }}
